<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Login</title>
</head>
<body>
  <section>
    <div class="max-w-6xl mx-auto py-[50x] px-[30px]">
      <h2 class="text-2xl font-bold text-[var(--primary)] text-center py-8">Login to Your Account</h2>
      <!-- genral container -->
       <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center py-8">
        <!-- first column -->
        <div class="flex flex-col gap-4">
          <h1 class="lg:text-3xl text-2xl font-bold text-[var(--primary)] text-center">Welcome Back to LUKEXX Wallet</h1>
          <p class="text-gray-500">Log in to access your dashboard, manage your virtual wallet, and view your transaction history.</p>
        </div>
        <!-- second column -->
        <div class="bg-white p-8 rounded-lg shadow-md pt-10">
          <form id="login-form" action="" class="flex flex-col gap-4">
             <!-- Error Message Display Area -->
            <div id="message-display" class="hidden"></div>

            <input id="login-email" type="email" placeholder="Email Address" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">
            <input id="login-password" type="password" placeholder="Password" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">

            <button id="login-btn" type="submit" class="bg-[var(--primary)] text-white py-2 px-4 rounded-md hover:bg-blue-600 transition duration-300">Login</button>
          </form>
          <div class="mt-4">
            <p class="text-gray-500">Don't have an account? <a href="register.html" class="text-[var(--primary)] hover:underline">Register here</a></p>
          </div>
  </section>


  <script src="./js/auth.js"></script>
</body>
</html>
